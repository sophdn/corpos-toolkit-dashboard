# nginx server for the toolkit-dashboard static SPA (rootless,
# nginx-unprivileged → non-root, listens on 8080).
#
# Pure static file serving with SPA history-fallback: any path that isn't a
# real file resolves to index.html so client-side routing (react-router) works
# on deep links / refresh. The dashboard reaches the toolkit API cross-origin
# (VITE_API_BASE_URL baked at build) — nginx does NOT proxy the API, so there's
# no upstream here and no coupling to the toolkit's container DNS.

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA history fallback: serve the file if it exists, else index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the content-hashed build assets; never cache index.html so a
    # rebuilt bundle is picked up immediately.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
